version: "3.8"

services:
  mcp-app:
    build: .
    ports:
      - "8000:8000" # Expose ONLY the MCP server port to the host
    environment:
      - CHROMA_HOST=chroma-db
      - CHROMA_PORT=8000
      - CHROMA_CLIENT_AUTH_PROVIDER=chromadb.auth.token_authn.TokenAuthClientProvider
      - CHROMA_CLIENT_AUTH_CREDENTIALS=test-auth-token
    depends_on:
      - chroma-db
    networks:
      - mcp-network

  ingestion-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CHROMA_HOST=chroma-db
      - CHROMA_PORT=8000
      - CHROMA_CLIENT_AUTH_PROVIDER=chromadb.auth.token_authn.TokenAuthClientProvider
      - CHROMA_CLIENT_AUTH_CREDENTIALS=test-auth-token
    depends_on:
      - chroma-db
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8080"]
    networks:
      - mcp-network

  chroma-db:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000" # Expose ChromaDB to the host
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTH_CREDENTIALS=test-auth-token
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

volumes:
  chroma-data:
